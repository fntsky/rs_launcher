<div class="hello-plugin">
  <h3>Hello Plugin</h3>
  <p id="hello-msg">Click the button to greet!</p>
  <input type="text" id="hello-name" placeholder="Enter name..." />
  <button id="hello-btn" onclick="helloGreet()">Greet</button>
</div>

<script>
async function helloGreet() {
  const name = document.getElementById('hello-name').value || 'World';
  try {
    const result = await window.__TAURI__.core.invoke('plugin_invoke', {
      pluginId: 'hello_plugin',
      command: 'greet',
      args: JSON.stringify({ name: name })
    });
    const data = JSON.parse(result);
    document.getElementById('hello-msg').textContent = data.message || data.error || 'No response';
  } catch (e) {
    document.getElementById('hello-msg').textContent = 'Error: ' + e;
  }
}
</script>
