<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hello Plugin</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="hello-plugin">
    <h3>Hello Plugin</h3>
    <p id="hello-msg" class="msg">输入名字打招呼</p>
    <div class="row">
      <input type="text" id="hello-name" placeholder="Enter name..." autocomplete="off" spellcheck="false">
      <button id="hello-btn" type="button">Greet</button>
    </div>
    <p class="hint" id="hello-version"></p>
  </div>
  <script src="./app.js"></script>
</body>
</html>
